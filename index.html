<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turbo Scanner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: monospace; font-size: 12px; }
  .header { background: #161b22; padding: 12px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #30363d; flex-wrap: wrap; }
  .header h1 { color: #58a6ff; font-size: 18px; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  input { background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 6px 12px; border-radius: 6px; font-size: 14px; width: 100px; }
  button { background: #238636; color: white; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
  button:hover { background: #2ea043; }
  .mode-toggle { display: flex; gap: 0; background: #21262d; border-radius: 8px; overflow: hidden; border: 1px solid #30363d; }
  .mode-btn { padding: 6px 20px; cursor: pointer; font-size: 13px; font-family: monospace; border: none; background: transparent; color: #8b949e; transition: all 0.2s; }
  .mode-btn.active.scalp { background: #f0a500; color: #000; font-weight: bold; }
  .mode-btn.active.swing { background: #1f6feb; color: #fff; font-weight: bold; }
  .status { padding: 8px 20px; font-size: 12px; color: #8b949e; }
  .price-badge { background: #1f6feb; color: white; padding: 2px 10px; border-radius: 10px; font-size: 12px; }
  .table-wrap { overflow: auto; padding: 0 10px 20px; }
  table { border-collapse: separate; border-spacing: 0; min-width: 100%; margin-top: 10px; }
  th { background: #161b22; color: #8b949e; padding: 6px 10px; text-align: center; border: 1px solid #30363d; white-space: nowrap; position: sticky; top: 0; z-index: 2; }
  th.strike-col { position: sticky; left: 0; z-index: 3; background: #161b22; }
  td { padding: 4px 8px; text-align: center; border: 1px solid #21262d; white-space: nowrap; min-width: 60px; }
  td.strike { background: #161b22; color: #8b949e; font-weight: bold; position: sticky; left: 0; z-index: 1; }
  td.current-price { background: #1f6feb !important; color: white !important; }
  tr.current-row td { outline: 2px solid #1f6feb; }
  tr.primary-row td { border-top: 2px solid #f0c040 !important; border-bottom: 2px solid #f0c040 !important; }
  tr.primary-row td:first-child { border-left: 3px solid #f0c040 !important; }
  tr.primary-row td:last-child { border-right: 3px solid #f0c040 !important; }
  tr.secondary-row td { border-top: 2px solid #58a6ff !important; border-bottom: 2px solid #58a6ff !important; }
  tr.secondary-row td:first-child { border-left: 3px solid #58a6ff !important; }
  tr.secondary-row td:last-child { border-right: 3px solid #58a6ff !important; }
  .legend { display: flex; gap: 16px; padding: 8px 20px; font-size: 11px; color: #8b949e; flex-wrap: wrap; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-box { width: 14px; height: 14px; border-radius: 3px; }
  .legend-primary { width: 14px; height: 14px; border: 2px solid #f0c040; border-radius: 3px; }
  .legend-secondary { width: 14px; height: 14px; border: 2px solid #58a6ff; border-radius: 3px; }
  .loading { text-align: center; padding: 60px; color: #8b949e; font-size: 16px; }
  .error { color: #f85149; padding: 20px; }
  .tabs { display: flex; gap: 4px; padding: 10px 20px 0; }
  .tab { padding: 6px 14px; border-radius: 6px 6px 0 0; cursor: pointer; color: #8b949e; border: 1px solid #30363d; border-bottom: none; background: #161b22; }
  .tab.active { color: #e6edf3; background: #21262d; border-color: #58a6ff; }
  .summary { display: flex; gap: 16px; padding: 8px 20px; flex-wrap: wrap; }
  .summary-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 8px 14px; }
  .summary-card .label { color: #8b949e; font-size: 11px; }
  .summary-card .value { font-size: 15px; font-weight: bold; margin-top: 2px; }
  .trade-section { margin: 0 20px 20px; }
  .trade-section h2 { color: #58a6ff; font-size: 14px; margin-bottom: 10px; }
  .mode-banner { padding: 6px 20px; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
  .mode-banner.scalp { background: rgba(240,165,0,0.15); color: #f0a500; border-left: 3px solid #f0a500; }
  .mode-banner.swing { background: rgba(31,111,235,0.15); color: #58a6ff; border-left: 3px solid #1f6feb; }
  .quick-rec { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
  .quick-rec-item { display: flex; flex-direction: column; gap: 2px; }
  .quick-rec-item .qlabel { color: #8b949e; font-size: 10px; }
  .quick-rec-item .qval { font-size: 13px; font-weight: bold; }
  .setup-cards { display: flex; gap: 12px; flex-wrap: wrap; }
  .setup-card { background: #161b22; border-radius: 8px; padding: 14px; flex: 1; min-width: 200px; }
  .setup-card.bull { border: 1px solid #238636; }
  .setup-card.bear { border: 1px solid #da3633; }
  .setup-card h3 { font-size: 13px; margin-bottom: 10px; }
  .setup-card.bull h3 { color: #3fb950; }
  .setup-card.bear h3 { color: #f85149; }
  .setup-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #21262d; font-size: 12px; gap: 12px; }
  .setup-row:last-child { border-bottom: none; }
  .setup-row .slabel { color: #8b949e; white-space: nowrap; }
  .setup-row .sval { font-weight: bold; text-align: right; }
  .budget-note { font-size: 11px; color: #8b949e; margin-top: 8px; padding: 6px 10px; background: #21262d; border-radius: 6px; }
</style>
</head>
<body>

<div id="lock-screen" style="
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#0d1117;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:9999;">
  <h1 style="color:#58a6ff;font-size:24px;margin-bottom:8px;">⚡ Turbo Scanner</h1>
  <p style="color:#8b949e;margin-bottom:24px;">Enter password to continue</p>
  <input id="pass-input" type="password" placeholder="Password"
    style="background:#21262d;border:1px solid #30363d;color:#e6edf3;
    padding:10px 16px;border-radius:6px;font-size:16px;width:220px;
    margin-bottom:12px;text-align:center;"
    onkeydown="if(event.key==='Enter')checkPass()"/>
  <button onclick="checkPass()"
    style="background:#238636;color:white;border:none;padding:10px 24px;
    border-radius:6px;font-size:15px;cursor:pointer;width:220px;">
    Enter
  </button>
  <p id="pass-error" style="color:#f85149;margin-top:12px;display:none;">
    Incorrect password
  </p>
</div>

<div class="header">
  <h1>⚡ Turbo Scanner</h1>
  <div class="controls">
    <input id="ticker" value="IWM" placeholder="Ticker" />
    <button onclick="analyze()">Analyze</button>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn scalp active" onclick="setMode('scalp')">⚡ Scalp</button>
    <button class="mode-btn swing" onclick="setMode('swing')">📈 Swing</button>
  </div>
  <span id="price-badge" class="price-badge" style="display:none"></span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('gex')">GEX</div>
  <div class="tab" onclick="switchTab('oi')">OI</div>
  <div class="tab" onclick="switchTab('volume')">Volume</div>
</div>

<div class="summary" id="summary"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-box" style="background:#1a4731"></div> Positive GEX</div>
  <div class="legend-item"><div class="legend-box" style="background:#4a1515"></div> Negative GEX</div>
  <div class="legend-item"><div class="legend-primary"></div> Primary Wall 👑</div>
  <div class="legend-item"><div class="legend-secondary"></div> Secondary Wall ◆</div>
  <div class="legend-item">🔮 Price Magnet</div>
</div>

<div class="status" id="status">Enter a ticker and tap Analyze</div>
<div id="trade-rec" style="display:none" class="trade-section"></div>
<div class="table-wrap" id="output"><div class="loading">Ready — enter a ticker above 🎯</div></div>

<script>
function checkPass() {
  const input = document.getElementById('pass-input').value;
  if (input === 'easymoney') {
    document.getElementById('lock-screen').style.display = 'none';
  } else {
    document.getElementById('pass-error').style.display = 'block';
  }
}

const TRADIER_TOKEN = "PJNRwKQDW5ArKyKnxLerGVddruQA";
const BASE = "https://api.tradier.com/v1";
let currentTab = "gex";
let currentMode = "scalp";
let lastData = null;

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll(".mode-btn").forEach(b => {
    b.classList.remove("active");
    if (b.classList.contains(mode)) b.classList.add("active");
  });
  if (lastData) buildAndShowTradeRec(lastData.spot, lastData.gexByStrike, lastData.expirations);
}

async function getQuote(ticker) {
  const r = await fetch(`${BASE}/markets/quotes?symbols=${ticker}`, {
    headers: { Authorization: `Bearer ${TRADIER_TOKEN}`, Accept: "application/json" }
  });
  const d = await r.json();
  return d.quotes.quote.last;
}

async function getExpirations(ticker) {
  const r = await fetch(`${BASE}/markets/options/expirations?symbol=${ticker}&includeAllRoots=true`, {
    headers: { Authorization: `Bearer ${TRADIER_TOKEN}`, Accept: "application/json" }
  });
  const d = await r.json();
  return d.expirations.date;
}

async function getChain(ticker, exp) {
  const r = await fetch(`${BASE}/markets/options/chains?symbol=${ticker}&expiration=${exp}&greeks=true`, {
    headers: { Authorization: `Bearer ${TRADIER_TOKEN}`, Accept: "application/json" }
  });
  const d = await r.json();
  return d.options?.option || [];
}

function calcGEX(option, spot) {
  const gamma = option.greeks?.gamma || 0;
  const oi = option.open_interest || 0;
  const mult = option.option_type === "put" ? -1 : 1;
  return gamma * oi * 100 * spot * spot * mult / 1e9;
}

function colorCell(val, rank) {
  if (val === 0) return `background:#0d1117;color:#444`;
  const intensity = Math.min(Math.abs(val) / 5, 1);
  if (val > 0) {
    if (rank === 'primary') return `background:rgb(10,180,30);color:#ffffff;font-weight:bold;font-size:13px`;
    if (rank === 'secondary') return `background:rgb(10,120,30);color:#afffb8;font-weight:bold`;
    const g = Math.round(40 + intensity * 80);
    return `background:rgb(10,${g},30);color:#3fb950`;
  } else {
    if (rank === 'primary') return `background:rgb(220,15,15);color:#ffffff;font-weight:bold;font-size:13px`;
    if (rank === 'secondary') return `background:rgb(140,15,15);color:#ffaaaa;font-weight:bold`;
    const r = Math.round(60 + intensity * 100);
    return `background:rgb(${r},15,15);color:#f85149`;
  }
}

function fmt(val) {
  if (val === 0) return "";
  const abs = Math.abs(val);
  if (abs >= 1000) return (val/1000).toFixed(1) + "K";
  return val.toFixed(1);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach((t,i) => {
    t.classList.toggle("active", ["gex","oi","volume"][i] === tab);
  });
  if (lastData) renderTable(lastData);
}

function buildAndShowTradeRec(spot, gexByStrike, expirations) {
  const isScalp = currentMode === "scalp";

  const sorted = Object.entries(gexByStrike).sort((a,b) => Math.abs(b[1]) - Math.abs(a[1]));
  const primaryStrike = Number(sorted[0]?.[0]);
  const secondaryStrikes = [Number(sorted[1]?.[0]), Number(sorted[2]?.[0])];

  const totalGEX = Object.values(gexByStrike).reduce((a,b) => a+b, 0);
  const isBullish = totalGEX > 0;

  const strikesAbove = Object.keys(gexByStrike).map(Number).filter(s => s > spot).sort((a,b) => a-b);
  const strikesBelow = Object.keys(gexByStrike).map(Number).filter(s => s < spot).sort((a,b) => b-a);

  const nearestResistance = strikesAbove[0] || spot + 2;
  const nearestSupport = strikesBelow[0] || spot - 2;

  // Scalp: use 0DTE or nearest expiry, tighter targets
  // Swing: use 2-4 weeks out, wider targets
  const scalpExp = expirations[0];
  const swingExp = expirations.find(e => {
    const days = (new Date(e) - new Date()) / (1000*60*60*24);
    return days >= 14;
  }) || expirations[2] || expirations[1];

  const recExp = isScalp ? scalpExp : swingExp;
  const recExpShort = recExp?.replace(/\d{4}-/, "") || "";

  // Strike selection
  // Scalp: ATM or 1 strike OTM (cheap, fast move)
  // Swing: 1-2 strikes OTM with more time
  const callStrike = isScalp
    ? (strikesAbove[0] || spot + 1)
    : (strikesAbove[1] || strikesAbove[0] || spot + 2);

  const putStrike = isScalp
    ? (strikesBelow[0] || spot - 1)
    : (strikesBelow[1] || strikesBelow[0] || spot - 2);

  const callTarget1 = nearestResistance;
  const callTarget2 = secondaryStrikes.find(s => s > callStrike) || callStrike + (isScalp ? 2 : 5);
  const putTarget1 = nearestSupport;
  const putTarget2 = secondaryStrikes.find(s => s < putStrike) || putStrike - (isScalp ? 2 : 5);

  // Confirmation timeframes
  const confirmTF = isScalp ? "1-3 min" : "1hr";
  const entryTF = isScalp ? "1-3 min candle close" : "15min candle close";
  const holdTime = isScalp ? "Minutes to 1hr" : "1-3 days";
  const targetReturn = "+100%";

  // Budget guidance for under $500
  const budgetNote = isScalp
    ? "💡 Under $500 budget: Look for options priced $0.50–$2.00. ATM or 1 strike OTM, 0DTE or same-week expiry gives best leverage for +100% moves."
    : "💡 Under $500 budget: Look for options priced $1.00–$4.00. 1-2 strikes OTM, 2-4 weeks out. Avoid paying too much time premium — target high IV setups.";

  const bias = isBullish ? "🟢 BULLISH" : "🔴 BEARISH";
  const biasColor = isBullish ? "#3fb950" : "#f85149";
  const modeColor = isScalp ? "#f0a500" : "#58a6ff";
  const modeLabel = isScalp ? "⚡ SCALP MODE — 1-3 Min Confirmation" : "📈 SWING MODE — 1Hr Confirmation / 15Min Entry";

  const tradeRec = document.getElementById("trade-rec");
  tradeRec.innerHTML = `
    <div class="mode-banner ${currentMode}">${modeLabel}</div>
    <h2>⚡ Trade Recommendations</h2>
    <div class="quick-rec">
      <div class="quick-rec-item">
        <span class="qlabel">GEX BIAS</span>
        <span class="qval" style="color:${biasColor}">${bias}</span>
      </div>
      <div class="quick-rec-item">
        <span class="qlabel">PRICE</span>
        <span class="qval" style="color:#58a6ff">$${spot}</span>
      </div>
      <div class="quick-rec-item">
        <span class="qlabel">🔮 MAGNET</span>
        <span class="qval" style="color:#f0c040">$${primaryStrike}</span>
      </div>
      <div class="quick-rec-item">
        <span class="qlabel">EXPIRY</span>
        <span class="qval" style="color:${modeColor}">${recExpShort}</span>
      </div>
      <div class="quick-rec-item">
        <span class="qlabel">CALL PLAY</span>
        <span class="qval" style="color:#3fb950">$${callStrike}C ${recExpShort}</span>
      </div>
      <div class="quick-rec-item">
        <span class="qlabel">PUT PLAY</span>
        <span class="qval" style="color:#f85149">$${putStrike}P ${recExpShort}</span>
      </div>
    </div>
    <div class="setup-cards">
      <div class="setup-card bull">
        <h3>📈 BULL SETUP — $${callStrike} Call ${recExpShort}</h3>
        <div class="setup-row"><span class="slabel">Mode</span><span class="sval" style="color:${modeColor}">${isScalp ? "⚡ Scalp" : "📈 Swing"}</span></div>
        <div class="setup-row"><span class="slabel">Confirm TF</span><span class="sval">${confirmTF} chart</span></div>
        <div class="setup-row"><span class="slabel">Trigger</span><span class="sval" style="color:#3fb950">Price reclaims $${spot} — ${entryTF}</span></div>
        <div class="setup-row"><span class="slabel">Entry</span><span class="sval">Buy $${callStrike} Call exp ${recExpShort}</span></div>
        <div class="setup-row"><span class="slabel">Target 1</span><span class="sval" style="color:#3fb950">$${callTarget1} (+50% option)</span></div>
        <div class="setup-row"><span class="slabel">Target 2 🎯</span><span class="sval" style="color:#3fb950">$${callTarget2} (+100% option)</span></div>
        <div class="setup-row"><span class="slabel">Stop Loss</span><span class="sval" style="color:#f85149">Below $${nearestSupport} (-50% option)</span></div>
        <div class="setup-row"><span class="slabel">Hold Time</span><span class="sval">${holdTime}</span></div>
        <div class="setup-row"><span class="slabel">Target Return</span><span class="sval" style="color:#f0c040">${targetReturn} 🔥</span></div>
        <div class="budget-note">${budgetNote}</div>
      </div>
      <div class="setup-card bear">
        <h3>📉 BEAR SETUP — $${putStrike} Put ${recExpShort}</h3>
        <div class="setup-row"><span class="slabel">Mode</span><span class="sval" style="color:${modeColor}">${isScalp ? "⚡ Scalp" : "📈 Swing"}</span></div>
        <div class="setup-row"><span class="slabel">Confirm TF</span><span class="sval">${confirmTF} chart</span></div>
        <div class="setup-row"><span class="slabel">Trigger</span><span class="sval" style="color:#f85149">Price rejected at $${spot} — ${entryTF}</span></div>
        <div class="setup-row"><span class="slabel">Entry</span><span class="sval">Buy $${putStrike} Put exp ${recExpShort}</span></div>
        <div class="setup-row"><span class="slabel">Target 1</span><span class="sval" style="color:#f85149">$${putTarget1} (+50% option)</span></div>
        <div class="setup-row"><span class="slabel">Target 2 🎯</span><span class="sval" style="color:#f85149">$${putTarget2} (+100% option)</span></div>
        <div class="setup-row"><span class="slabel">Stop Loss</span><span class="sval" style="color:#3fb950">Above $${nearestResistance} (-50% option)</span></div>
        <div class="setup-row"><span class="slabel">Hold Time</span><span class="sval">${holdTime}</span></div>
        <div class="setup-row"><span class="slabel">Target Return</span><span class="sval" style="color:#f0c040">${targetReturn} 🔥</span></div>
        <div class="budget-note">${budgetNote}</div>
      </div>
    </div>
  `;
  tradeRec.style.display = "block";
}

function renderTable(data) {
  const { strikeMap, expirations, spot, gexByStrike } = data;
  const allStrikes = Object.keys(strikeMap).map(Number).sort((a,b) => b - a);

  const sorted = Object.entries(gexByStrike).sort((a,b) => Math.abs(b[1]) - Math.abs(a[1]));
  const primaryStrike = Number(sorted[0]?.[0]);
  const secondaryStrikes = new Set([Number(sorted[1]?.[0]), Number(sorted[2]?.[0])]);

  const closestStrike = allStrikes.reduce((a,b) => Math.abs(a-spot) < Math.abs(b-spot) ? a : b);
  const closestIdx = allStrikes.indexOf(closestStrike);

  const magnetStrike = Object.entries(gexByStrike)
    .filter(([s,v]) => v > 0)
    .sort((a,b) => Math.abs(Number(a[0])-spot) - Math.abs(Number(b[0])-spot))[0]?.[0];

  const visibleStrikes = allStrikes.filter((s, i) => i >= closestIdx - 10 && i <= closestIdx + 10);

  let html = `<table><tr><th class="strike-col">STRIKE</th>`;
  expirations.forEach(e => { html += `<th>${e.replace(/\d{4}-/,"")}</th>`; });
  html += `</tr>`;

  visibleStrikes.forEach(strike => {
    const isPrimary = strike === primaryStrike;
    const isSecondary = secondaryStrikes.has(strike);
    const isCurrent = strike === closestStrike;
    const isMagnet = String(strike) === String(magnetStrike) && !isCurrent;
    const rank = isPrimary ? 'primary' : isSecondary ? 'secondary' : null;

    let rowClass = "";
    if (isCurrent) rowClass += " current-row";
    if (isPrimary) rowClass += " primary-row";
    else if (isSecondary) rowClass += " secondary-row";

    html += `<tr class="${rowClass.trim()}">`;

    let strikeLabel = `$${strike}`;
    if (isCurrent) strikeLabel += ` 📍`;
    else if (isPrimary) strikeLabel += ` 👑`;
    else if (isSecondary) strikeLabel += ` ◆`;
    if (isMagnet) strikeLabel += ` 🔮`;

    const strikeStyle = isPrimary ? `color:#f0c040;` : isSecondary ? `color:#58a6ff;` : ``;

    html += `<td class="strike ${isCurrent ? 'current-price' : ''}" style="${strikeStyle}">${strikeLabel}</td>`;

    expirations.forEach(exp => {
      const cell = strikeMap[strike]?.[exp];
      let display = "";
      let style = "background:#0d1117;color:#444";

      if (cell) {
        if (currentTab === "gex") {
          const val = cell.gex;
          display = fmt(val);
          style = colorCell(val, rank);
        } else if (currentTab === "oi") {
          const val = (cell.callOI || 0) + (cell.putOI || 0);
          display = val > 0 ? (val >= 1000 ? (val/1000).toFixed(1)+"K" : val) : "";
          style = val > 0 ? `background:#1a2a1a;color:#3fb950` : `background:#0d1117;color:#444`;
        } else {
          const val = (cell.callVol || 0) + (cell.putVol || 0);
          display = val > 0 ? (val >= 1000 ? (val/1000).toFixed(1)+"K" : val) : "";
          style = val > 0 ? `background:#1a1a2a;color:#58a6ff` : `background:#0d1117;color:#444`;
        }
      }
      html += `<td style="${style}">${display}</td>`;
    });
    html += `</tr>`;
  });

  html += `</table>`;
  document.getElementById("output").innerHTML = html;
}

async function analyze() {
  const ticker = document.getElementById("ticker").value.trim().toUpperCase();
  if (!ticker) return;
  document.getElementById("status").textContent = `Loading ${ticker}...`;
  document.getElementById("output").innerHTML = `<div class="loading">Fetching options chain for ${ticker}... ⏳</div>`;
  document.getElementById("summary").innerHTML = "";
  document.getElementById("trade-rec").style.display = "none";
  document.getElementById("price-badge").style.display = "none";

  try {
    const [spot, expirations] = await Promise.all([getQuote(ticker), getExpirations(ticker)]);
    const exps = expirations.slice(0, 8);

    const chains = await Promise.all(exps.map(e => getChain(ticker, e)));

    const strikeMap = {};
    const gexByStrike = {};

    chains.forEach((chain, i) => {
      const exp = exps[i];
      chain.forEach(opt => {
        const strike = opt.strike;
        if (!strikeMap[strike]) strikeMap[strike] = {};
        if (!strikeMap[strike][exp]) strikeMap[strike][exp] = { gex:0, callOI:0, putOI:0, callVol:0, putVol:0 };
        const gex = calcGEX(opt, spot);
        strikeMap[strike][exp].gex += gex;
        if (opt.option_type === "call") {
          strikeMap[strike][exp].callOI += opt.open_interest || 0;
          strikeMap[strike][exp].callVol += opt.volume || 0;
        } else {
          strikeMap[strike][exp].putOI += opt.open_interest || 0;
          strikeMap[strike][exp].putVol += opt.volume || 0;
        }
        gexByStrike[strike] = (gexByStrike[strike] || 0) + gex;
      });
    });

    const totalGEX = Object.values(gexByStrike).reduce((a,b) => a+b, 0);
    const topWall = Object.entries(gexByStrike).sort((a,b) => Math.abs(b[1])-Math.abs(a[1]))[0];
    const posGEX = Object.values(gexByStrike).filter(v => v > 0).reduce((a,b) => a+b, 0);
    const negGEX = Object.values(gexByStrike).filter(v => v < 0).reduce((a,b) => a+b, 0);

    document.getElementById("price-badge").textContent = `$${spot}`;
    document.getElementById("price-badge").style.display = "inline";
    document.getElementById("summary").innerHTML = `
      <div class="summary-card"><div class="label">Net GEX</div><div class="value" style="color:${totalGEX>0?'#3fb950':'#f85149'}">${totalGEX.toFixed(1)}B</div></div>
      <div class="summary-card"><div class="label">👑 Primary Wall</div><div class="value" style="color:#f0c040">$${topWall[0]}</div></div>
      <div class="summary-card"><div class="label">Positive GEX</div><div class="value" style="color:#3fb950">+${posGEX.toFixed(1)}B</div></div>
      <div class="summary-card"><div class="label">Negative GEX</div><div class="value" style="color:#f85149">${negGEX.toFixed(1)}B</div></div>
    `;

    lastData = { strikeMap, expirations: exps, spot, gexByStrike };
    renderTable(lastData);
    buildAndShowTradeRec(spot, gexByStrike, exps);

    document.getElementById("status").textContent = `✅ ${ticker} — showing 10 strikes above & below $${spot}`;

  } catch(err) {
    document.getElementById("output").innerHTML = `<div class="error">❌ Error: ${err.message}<br><br>Check your token and try again.</div>`;
    document.getElementById("status").textContent = "Error loading data";
  }
}
</script>
</body>
</html>
